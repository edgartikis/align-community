<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10233e" />
  <title>Mi tarjeta | ALIGN COMMUNITY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,600&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--paper:#f2efe9;--ink:#090a0c;--navy:#10233e;--champagne:#d9c6a5;--soft:#f0ede7}
    *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:30px 18px;background:radial-gradient(circle at 50% 0%,#fff 0,var(--paper) 42%,#e9e4dc 100%);color:var(--paper);font-family:"DM Sans",sans-serif}main{width:min(100%,438px)}
    .card{position:relative;isolation:isolate;min-height:650px;overflow:hidden;padding:28px 29px 25px;display:flex;flex-direction:column;border:1px solid rgba(179,201,225,.3);border-radius:28px;background:linear-gradient(138deg,#24466c 0%,#10233e 35%,#071426 100%);box-shadow:0 34px 75px rgba(9,21,37,.42),inset 0 1px rgba(255,255,255,.12),inset 0 0 55px rgba(0,0,0,.34)}
    .card::before{content:"";position:absolute;z-index:-1;inset:0;opacity:.46;background:linear-gradient(125deg,transparent 0 14%,rgba(194,211,230,.66) 14.25% 14.55%,transparent 14.8% 100%),linear-gradient(125deg,transparent 0 16.3%,rgba(123,160,195,.48) 16.55% 16.85%,transparent 17.1% 100%),radial-gradient(circle at 100% 100%,rgba(2,7,13,.48),transparent 35%),repeating-linear-gradient(118deg,transparent 0 7px,rgba(255,255,255,.018) 8px 9px)}
    .card::after{content:"";position:absolute;z-index:-1;inset:10px;border:1px solid rgba(217,198,165,.13);border-radius:20px;pointer-events:none}.card.black{background:linear-gradient(138deg,#353538 0%,#0a0a0b 24%,#000 70%,#151515 100%);border-color:rgba(217,198,165,.46)}
    .top,.bottom{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}.top{position:relative;justify-content:flex-start;min-height:76px}.logo{width:96px;height:76px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.18))}.eyebrow,.status{margin:0;font-family:"DM Mono",monospace;font-size:.63rem;letter-spacing:.16em;text-transform:uppercase}.status{position:absolute;right:0;top:2px;display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid rgba(217,198,165,.46);border-radius:999px;color:var(--champagne);background:rgba(217,198,165,.06)}.status::before{content:"";width:5px;height:5px;border-radius:50%;background:#bfe0c7;box-shadow:0 0 8px #bfe0c7}.level{margin:20px 0 0;font-family:"Bodoni Moda",serif;font-size:3.75rem;font-weight:500;line-height:.86;letter-spacing:-.07em;color:#f6f3ee;text-shadow:0 5px 28px rgba(0,0,0,.45)}.member-label{margin:23px 0 0;font-family:"DM Mono",monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase}.member{margin:6px 0 0;font-size:1.35rem;font-weight:500;color:var(--soft)}.membership-line{display:flex;align-items:center;gap:9px;margin:12px 0 0;color:rgba(240,237,231,.7);font-family:"DM Mono",monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase}.membership-line::after{content:"";width:30px;height:1px;background:rgba(217,198,165,.62)}
    .qr-area{margin-top:auto;display:grid;grid-template-columns:1fr auto;align-items:end;gap:18px}.qr-wrap{width:154px;height:154px;padding:10px;background:#faf8f4;border:4px solid rgba(217,198,165,.86);border-radius:14px;box-shadow:0 15px 29px rgba(0,0,0,.48)}.qr-wrap img{display:block;width:100%;height:100%}.caption{margin:0;text-align:left;color:rgba(231,225,214,.78);font-size:.7rem;line-height:1.55}.period{display:block;margin-top:8px;color:var(--champagne);font-family:"DM Mono",monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase}.bottom{margin-top:18px;padding-top:15px;border-top:1px solid rgba(217,198,165,.38)}.bottom>div:last-child{text-align:right}.code{margin:7px 0 0;font-family:"DM Mono",monospace;font-size:.88rem;letter-spacing:.1em}.saving{margin:7px 0 0;color:var(--champagne);font-family:"Bodoni Moda",serif;font-size:1.26rem}.load{min-height:626px;display:grid;place-items:center;border-radius:28px;background:var(--navy);font-family:"Bodoni Moda",serif;font-size:1.55rem}.error{background:#16171a;text-align:center;padding:36px}.hint{margin:18px 8px 0;color:#68645e;text-align:center;font-size:.76rem;line-height:1.5}
    @media(max-width:390px){.card{min-height:620px;padding:24px}.level{font-size:3.45rem}.qr-area{gap:12px}.qr-wrap{width:142px;height:142px}}
  </style>
</head>
<body>
  <main>
    <section id="app" class="load">Cargando tu tarjeta…</section>
    <p class="hint">El QR se renueva automáticamente cada mes. El aliado debe verificar nombre, membresía y fotografía.</p>
  </main>
  <script>
    const app=document.querySelector('#app');
    const token=location.pathname.split('/').filter(Boolean).pop();
    const money=new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0});
    const escapeHtml=(value)=>String(value??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[c]);
    const showError=()=>{app.className='card error';app.innerHTML="<div><p class='eyebrow'>ALIGN COMMUNITY</p><h1>Tarjeta no disponible</h1><p class='caption'>Revisa que el enlace esté completo o contacta a ALIGN.</p></div>"};
    const monthLabel=(period)=>{const [year,month]=period.split('-').map(Number);return new Intl.DateTimeFormat('es-MX',{month:'long',year:'numeric'}).format(new Date(Date.UTC(year,month-1,1)))};
    async function renderCard(member){
      const isBlack=member.level==='Black';
      const qrResponse=await fetch(`/.netlify/functions/monthly-qr?token=${encodeURIComponent(token)}`,{cache:'no-store'});
      const qrData=await qrResponse.json();
      if(!qrResponse.ok||!qrData.validationUrl)throw new Error('qr');
      const logoSrc='/assets/align-logo-card.png';
      app.className=`card ${isBlack?'black':''}`;
      app.innerHTML=`<div class="top"><img class="logo" src="${logoSrc}" alt="ALIGN"><p class="status">Activa</p></div><div><h1 class="level">${escapeHtml(member.level)}</h1><p class="member-label">Miembro ${escapeHtml(member.level)}</p><p class="member">${escapeHtml(member.name)}</p><p class="membership-line">ALIGN COMMUNITY</p></div><div class="qr-area"><p class="caption">Presenta este código al aliado. Al escanearlo verá tus datos oficiales y podrá confirmar tu identidad.<span class="period">Vigencia: ${escapeHtml(monthLabel(qrData.period))}</span></p><div class="qr-wrap"><img id="qr" alt="Código QR mensual"></div></div><div class="bottom"><div><p class="eyebrow">Código de socio</p><p class="code">${escapeHtml(member.memberCode)}</p></div><div><p class="eyebrow">Ahorro</p><p class="saving">${money.format(member.savings||0)}</p></div></div>`;
      document.querySelector('#qr').src=`https://api.qrserver.com/v1/create-qr-code/?size=164x164&margin=0&data=${encodeURIComponent(qrData.validationUrl)}`;
    }
    async function loadCard(){
      try{
        if(!/^[A-Za-z0-9_-]{20,}$/.test(token))throw new Error('token');
        const response=await fetch(`/member-status?token=${encodeURIComponent(token)}`,{cache:'no-store'});
        const member=await response.json();
        if(!response.ok||!member.active)throw new Error('inactive');
        await renderCard(member);
      }catch(error){showError()}
    }
    loadCard();
  </script>
</body>
</html>
