[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/.netlify/functions/create-checkout"
  to = "/.netlify/functions/create-checkout-v2"
  status = 200
  force = true
  query = { plan = ":plan" }

[[redirects]]
  from = "/member/*"
  to = "/member.html"
  status = 200

[[redirects]]
  from = "/member-status"
  to = "/.netlify/functions/member-card"
  status = 200
  force = true
