<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090a0c" />
  <title>Activando membresía | ALIGN</title>
  <style>
    *{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:#090a0c;color:#f5f2ec;font-family:Arial,sans-serif;text-align:center}.panel{width:min(100%,520px);padding:46px 30px;border:1px solid rgba(255,255,255,.2);background:linear-gradient(145deg,#172a45,#080b10)}.mark{width:58px;height:58px;margin:0 auto 24px;display:grid;place-items:center;border:1px solid #f5f2ec;border-radius:50%;font-family:Georgia,serif;font-size:30px}h1{margin:0;font-family:Georgia,serif;font-weight:400;font-size:clamp(34px,8vw,55px);line-height:1}p{margin:20px auto 0;max-width:390px;color:#cbc7be;line-height:1.6}.loader{width:34px;height:34px;margin:26px auto 0;border:2px solid rgba(255,255,255,.22);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}.button{display:none;margin-top:25px;padding:13px 18px;border:1px solid #fff;color:#fff;text-decoration:none;text-transform:uppercase;font-size:12px;letter-spacing:.1em}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="panel"><div class="mark">A</div><h1 id="title">Pago aceptado.</h1><p id="message">Estamos activando tu membresía y preparando tu tarjeta personal.</p><div id="loader" class="loader"></div><a id="retry" class="button" href="/">Volver al inicio</a></main>
  <script>
    const title=document.querySelector("#title"),message=document.querySelector("#message"),loader=document.querySelector("#loader"),retry=document.querySelector("#retry");
    const sessionId=new URLSearchParams(location.search).get("session_id");
    async function activate(attempt=0){
      try{
        if(!sessionId)throw new Error("missing");
        const response=await fetch(`/.netlify/functions/activate-membership?session_id=${encodeURIComponent(sessionId)}`,{cache:"no-store"});
        const data=await response.json();
        if(response.status===202&&attempt<8){setTimeout(()=>activate(attempt+1),1200);return}
        if(!response.ok||!data.memberUrl)throw new Error(data.error||"failed");
        title.textContent=`Bienvenido a ALIGN ${data.level}.`;
        message.textContent="Tu membresía está activa. Te llevaremos a tu tarjeta.";
        location.replace(data.memberUrl);
      }catch(error){
        title.textContent="Pago recibido.";
        message.textContent="No pudimos mostrar tu tarjeta todavía. Contacta a ALIGN con el correo usado en el pago.";
        loader.style.display="none";retry.style.display="inline-block";
      }
    }
    activate();
  </script>
</body>
</html>
