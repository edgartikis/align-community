<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1119" />
  <title>Mi portal | ALIGN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#090a0c;--paper:#f4f1eb;--navy:#10233e;--muted:#96999f;--line:rgba(255,255,255,.13);--champagne:#d9c6a5}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#0a0d12;color:var(--paper);font-family:"DM Sans",sans-serif}a{color:inherit;text-decoration:none}.nav{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:20px 5vw;border-bottom:1px solid var(--line);background:rgba(9,10,12,.88);backdrop-filter:blur(18px)}.brand{font:500 1.25rem "Playfair Display",serif;letter-spacing:.2em}.nav-actions{display:flex;align-items:center;gap:18px}.nav-actions a,.logout{font:500 .68rem "DM Mono",monospace;letter-spacing:.11em;text-transform:uppercase}.logout{padding:0;border:0;background:none;color:#aaa;cursor:pointer}.hero{padding:76px 5vw 52px;background:radial-gradient(circle at 80% 0,#1f3858 0,transparent 38%),linear-gradient(145deg,#111820,#090a0c)}.eyebrow{margin:0 0 14px;font:500 .68rem "DM Mono",monospace;letter-spacing:.15em;text-transform:uppercase;color:#aeb4bd}.hero-grid{display:grid;grid-template-columns:1.5fr .8fr;gap:32px;align-items:end}.hero h1{max-width:820px;margin:0;font:500 clamp(3rem,7vw,6.7rem)/.92 "Playfair Display",serif;letter-spacing:-.055em}.hero-copy{max-width:560px;margin:24px 0 0;color:#c7c9cd;line-height:1.65}.member-card{padding:26px;border:1px solid rgba(217,198,165,.3);background:linear-gradient(145deg,#18375a,#08131f);box-shadow:0 25px 60px rgba(0,0,0,.35)}.member-card.black{background:linear-gradient(145deg,#2c2c2e,#030303)}.member-level{margin:2px 0 16px;font:500 3.2rem "Playfair Display",serif}.member-meta{display:flex;justify-content:space-between;gap:16px;padding-top:16px;border-top:1px solid var(--line);font:500 .68rem "DM Mono",monospace;letter-spacing:.08em;text-transform:uppercase;color:#c9c1b2}.tabs{display:flex;gap:8px;padding:22px 5vw;border-bottom:1px solid rgba(255,255,255,.08);background:#0d1117;overflow:auto}.tabs a{white-space:nowrap;padding:10px 14px;border:1px solid rgba(255,255,255,.14);font:500 .67rem "DM Mono",monospace;letter-spacing:.1em;text-transform:uppercase}.section{padding:76px 5vw}.section.light{background:var(--paper);color:var(--ink)}.section-head{display:flex;justify-content:space-between;align-items:end;gap:26px;margin-bottom:30px}.section h2{margin:0;font:500 clamp(2.4rem,5vw,4.7rem)/.98 "Playfair Display",serif;letter-spacing:-.045em}.section-head p{max-width:450px;margin:0;color:#92969d;line-height:1.6}.light .section-head p{color:#5b5d61}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.event,.benefit{overflow:hidden;border:1px solid var(--line);background:#10151d}.light .benefit{border-color:rgba(9,10,12,.14);background:#fff}.event img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block}.content{padding:24px}.meta{margin:0 0 10px;font:500 .65rem "DM Mono",monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}.event h3,.benefit h3{margin:0;font:500 1.8rem/1.05 "Playfair Display",serif}.event p,.benefit p{margin:14px 0 0;color:#b8bbc0;line-height:1.55}.light .benefit p{color:#56585c}.pill{display:inline-block;margin-top:17px;padding:7px 10px;border:1px solid rgba(217,198,165,.45);font:500 .62rem "DM Mono",monospace;letter-spacing:.09em;text-transform:uppercase;color:var(--champagne)}.action{display:inline-block;margin-top:20px;padding:12px 15px;border:1px solid #fff;font:600 .68rem "DM Mono",monospace;letter-spacing:.1em;text-transform:uppercase}.action:hover{background:#fff;color:#090a0c}.light .action{border-color:#090a0c}.light .action:hover{background:#090a0c;color:#fff}.empty{padding:30px;border:1px dashed rgba(255,255,255,.2);color:#aaa}.footer{padding:30px 5vw;border-top:1px solid var(--line);display:flex;justify-content:space-between;color:#777;font:500 .65rem "DM Mono",monospace;letter-spacing:.08em;text-transform:uppercase}@media(max-width:900px){.hero-grid,.grid{grid-template-columns:1fr}.member-card{margin-top:12px}.section-head{display:block}.section-head p{margin-top:14px}}@media(max-width:600px){.nav{padding:18px 6vw}.nav-actions a{display:none}.hero,.section{padding-left:6vw;padding-right:6vw}.tabs{padding-left:6vw}.footer{flex-direction:column;gap:10px}.hero h1{font-size:3.4rem}}
  </style>
</head>
<body>
  <nav class="nav"><a class="brand" href="/">ALIGN</a><div class="nav-actions"><a href="#eventos">Eventos</a><a href="#beneficios">Beneficios</a><button id="logout" class="logout">Cerrar sesión</button></div></nav>
  <div id="app"><section class="hero"><p class="eyebrow">Cargando tu portal</p><div class="empty">Estamos preparando tus beneficios…</div></section></div>
  <script>
    const app=document.querySelector('#app');
    const qs=new URLSearchParams(location.search);
    const token=qs.get('token')||sessionStorage.getItem('align_member_token');
    const escapeHtml=(value)=>String(value??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[c]);
    const images={welcome:'/public/images/events/ChatGPT%20Image%2023%20jul%202026,%2007_35_24%20p.m..png',pilates:'/public/images/events/ChatGPT%20Image%2023%20jul%202026,%2007_36_34%20p.m..png',boat:'/public/images/events/WhatsApp%20Image%202026-07-23%20at%206.31.30%20PM.jpeg',table:'/public/images/events/ChatGPT%20Image%2023%20jul%202026,%2007_37_45%20p.m..png',annual:'/public/images/events/ChatGPT%20Image%2023%20jul%202026,%2007_33_30%20p.m..png'};
    const events=[
      {month:'Febrero',title:'Chapter One: ALIGN',copy:'Cena de bienvenida junto a la laguna para presentar el calendario anual.',tag:'Incluido para miembros',img:images.welcome},
      {month:'Marzo',title:'Equestrian Pilates',copy:'Dos sesiones de bienestar, música y comunidad en La Herradura.',tag:'Cupo limitado',img:images.pilates},
      {month:'Abril',title:'ALIGN Boat Party',copy:'DJ, atardecer y convivencia en el agua con precio preferencial.',tag:'Precio miembro $150',img:images.boat},
      {month:'Agosto',title:'ALIGN Local Table',copy:'Cena curada de cuatro tiempos con producto y talento local.',tag:'60 lugares',img:images.table},
      {month:'Noviembre',title:'Equestrian Pilates II',copy:'Una nueva edición con activaciones y propuesta visual renovada.',tag:'Pre-registro',img:images.pilates},
      {month:'Diciembre',title:'ALIGN Annual Event',copy:'El gran cierre del año con música, gastronomía y producción especial.',tag:'Signature experience',img:images.annual}
    ];
    const society=[
      {name:'Restaurantes seleccionados',offer:'Descuentos individuales y promociones especiales al presentar tu QR.'},
      {name:'ALIGN & Rancho MX',offer:'Precio preferencial en piezas y lanzamientos seleccionados.'},
      {name:'Boat Party',offer:'Acceso con precio miembro de $150 MXN.'},
      {name:'Experiencias ALIGN',offer:'Acceso anticipado a eventos seleccionados de la comunidad.'}
    ];
    const black=[
      {name:'Restaurantes seleccionados',offer:'Beneficios aplicables a la mesa completa en aliados participantes.'},
      {name:'Rush / AM Gym',offer:'Beneficios wellness y promociones exclusivas para miembros Black.'},
      {name:'Sante / Nuva Pilates',offer:'Tarifa preferencial y acceso a activaciones especiales.'},
      {name:'USPIN',offer:'Beneficios en clases y experiencias seleccionadas.'},
      {name:'ALIGN & Rancho MX',offer:'Precio preferencial y acceso anticipado a lanzamientos.'},
      {name:'Eventos ALIGN',offer:'Prioridad de inscripción y beneficios superiores en experiencias.'}
    ];
    const signup=(eventTitle,member)=>`mailto:alignservice18@gmail.com?subject=${encodeURIComponent('Inscripción '+eventTitle)}&body=${encodeURIComponent('Hola ALIGN, quiero inscribirme a '+eventTitle+'.\n\nNombre: '+member.name+'\nNúmero de socio: '+member.memberCode+'\nMembresía: '+member.level)}`;
    function render(member){
      const isBlack=member.level==='Black';
      const benefits=isBlack?black:society;
      app.innerHTML=`
        <section class="hero"><div class="hero-grid"><div><p class="eyebrow">Bienvenido, ${escapeHtml(member.name)}</p><h1>Tu membresía ya está en movimiento.</h1><p class="hero-copy">Explora experiencias, inscríbete a eventos y consulta los beneficios disponibles para tu nivel.</p></div><aside class="member-card ${isBlack?'black':''}"><p class="eyebrow">ALIGN COMMUNITY</p><div class="member-level">${escapeHtml(member.level)}</div><div class="member-meta"><span>${escapeHtml(member.memberCode)}</span><span>Activa</span></div></aside></div></section>
        <div class="tabs"><a href="#eventos">Próximos eventos</a><a href="#beneficios">Mis descuentos</a><a href="/member/${encodeURIComponent(token)}">Ver tarjeta digital</a></div>
        <section id="eventos" class="section"><div class="section-head"><h2>Inscríbete a lo que sigue.</h2><p>Tu solicitud se enviará con tus datos de socio para que ALIGN confirme disponibilidad y condiciones.</p></div><div class="grid">${events.map(event=>`<article class="event"><img src="${event.img}" alt="${escapeHtml(event.title)}"><div class="content"><p class="meta">${event.month}</p><h3>${escapeHtml(event.title)}</h3><p>${escapeHtml(event.copy)}</p><span class="pill">${escapeHtml(event.tag)}</span><br><a class="action" href="${signup(event.title,member)}">Inscribirme</a></div></article>`).join('')}</div></section>
        <section id="beneficios" class="section light"><div class="section-head"><h2>Tus beneficios ${escapeHtml(member.level)}.</h2><p>Presenta tu tarjeta digital antes de ordenar o pagar. Los beneficios pueden estar sujetos a fechas, horarios y disponibilidad del aliado.</p></div><div class="grid">${benefits.map(item=>`<article class="benefit"><div class="content"><p class="meta">Beneficio activo</p><h3>${escapeHtml(item.name)}</h3><p>${escapeHtml(item.offer)}</p><a class="action" href="/member/${encodeURIComponent(token)}">Abrir mi QR</a></div></article>`).join('')}</div></section>
        <footer class="footer"><span>© 2026 ALIGN COMMUNITY</span><span>Tampico · Madero · Altamira</span></footer>`;
    }
    async function load(){
      if(!token){location.replace('/login.html');return;}
      try{
        sessionStorage.setItem('align_member_token',token);
        const response=await fetch(`/member-status?token=${encodeURIComponent(token)}`,{cache:'no-store'});
        const member=await response.json();
        if(!response.ok||!member.active)throw new Error('inactive');
        render(member);
      }catch(error){sessionStorage.removeItem('align_member_token');app.innerHTML='<section class="hero"><p class="eyebrow">Acceso no disponible</p><h1>Tu sesión no pudo validarse.</h1><p class="hero-copy">Vuelve a iniciar sesión o contacta a ALIGN para revisar tu membresía.</p><a class="action" href="/login.html">Ir a log in</a></section>';}
    }
    document.querySelector('#logout').addEventListener('click',()=>{sessionStorage.removeItem('align_member_token');location.replace('/login.html');});
    load();
  </script>
</body>
</html>
