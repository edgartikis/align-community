<!doctype html>
<html lang="es-MX">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><meta name="theme-color" content="#0a0d12"/>
<title>Tu foto de perfil | ALIGN</title>
<style>
*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 0,#1d3554,#090a0c 52%);color:#f5f2ec;font-family:Arial,sans-serif}.panel{width:min(100%,520px);padding:34px;border:1px solid rgba(255,255,255,.18);background:rgba(9,12,17,.92);box-shadow:0 30px 80px rgba(0,0,0,.45)}.mark{width:58px;height:58px;display:grid;place-items:center;margin:0 auto 20px;border:1px solid #fff;border-radius:50%;font-family:Georgia,serif;font-size:30px}h1{margin:0;text-align:center;font:400 clamp(34px,8vw,52px)/1 Georgia,serif}p{color:#bfc3ca;line-height:1.55;text-align:center}.camera{position:relative;width:min(100%,360px);aspect-ratio:1;margin:26px auto 18px;overflow:hidden;border-radius:50%;border:3px solid #d9c6a5;background:#111923}.camera video,.camera img{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}.camera img{display:none}.actions{display:grid;gap:10px}.button{width:100%;padding:14px;border:1px solid #fff;background:#fff;color:#090a0c;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}.secondary{background:transparent;color:#fff}.note{font-size:.77rem;color:#858a92}.error{min-height:22px;color:#efb9b9;text-align:center;font-size:.85rem}.hidden{display:none}
</style>
</head>
<body><main class="panel"><div class="mark">A</div><h1>Esta cuenta es tuya.</h1><p>Tómate una foto clara de frente. Se usará para identificarte cuando presentes tu QR.</p><div class="camera"><video id="video" autoplay playsinline muted></video><img id="preview" alt="Vista previa de tu foto"/></div><canvas id="canvas" width="320" height="320" class="hidden"></canvas><div class="actions"><button id="capture" class="button">Tomar foto</button><button id="retake" class="button secondary hidden">Volver a tomar</button><button id="save" class="button hidden">Guardar y abrir mi cuenta</button></div><div id="error" class="error"></div><p class="note">La foto queda asociada a tu membresía y no se publica en redes sociales.</p></main>
<script>
const token=new URLSearchParams(location.search).get('token');const video=document.querySelector('#video'),preview=document.querySelector('#preview'),canvas=document.querySelector('#canvas'),capture=document.querySelector('#capture'),retake=document.querySelector('#retake'),save=document.querySelector('#save'),errorBox=document.querySelector('#error');let stream,photo='';
async function startCamera(){try{if(!token)throw new Error('Enlace de cuenta no válido.');stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:720},height:{ideal:720}},audio:false});video.srcObject=stream;}catch(error){errorBox.textContent='Activa el permiso de cámara o abre esta página desde tu celular.';}}
function stopCamera(){if(stream)stream.getTracks().forEach(track=>track.stop());}
capture.addEventListener('click',()=>{if(!video.videoWidth)return;const size=Math.min(video.videoWidth,video.videoHeight),sx=(video.videoWidth-size)/2,sy=(video.videoHeight-size)/2,ctx=canvas.getContext('2d');ctx.save();ctx.translate(320,0);ctx.scale(-1,1);ctx.drawImage(video,sx,sy,size,size,0,0,320,320);ctx.restore();let quality=.72;photo=canvas.toDataURL('image/jpeg',quality);while(photo.length>43000&&quality>.35){quality-=.08;photo=canvas.toDataURL('image/jpeg',quality);}preview.src=photo;preview.style.display='block';video.style.display='none';capture.classList.add('hidden');retake.classList.remove('hidden');save.classList.remove('hidden');stopCamera();});
retake.addEventListener('click',()=>{photo='';preview.style.display='none';video.style.display='block';capture.classList.remove('hidden');retake.classList.add('hidden');save.classList.add('hidden');startCamera();});
save.addEventListener('click',async()=>{try{save.disabled=true;save.textContent='Guardando…';errorBox.textContent='';const response=await fetch('/.netlify/functions/upload-profile-photo',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({token,photo})});const data=await response.json();if(!response.ok)throw new Error(data.error||'No se pudo guardar.');location.replace(data.memberUrl||`/member/${encodeURIComponent(token)}`);}catch(error){errorBox.textContent=error.message;save.disabled=false;save.textContent='Guardar y abrir mi cuenta';}});
startCamera();
</script></body></html>
